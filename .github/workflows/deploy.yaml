name: Deploy to Ubuntu Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up SSH
      uses: webfactory/ssh-agent@v0.5.4
      with:
        ssh-private-key: ${{ secrets.GANA }}

    - name: Deploy to server
      run: ssh -o StrictHostKeyChecking=no webserver@192.168.1.100 "cd /home/webserver/systems/Performance-Evaluation/Smct-Eval-server && COMPOSE_HTTP_TIMEOUT=120 git pull && docker-compose down && docker-compose up --build -d "
